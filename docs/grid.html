<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic AG Grid with Fixed Columns</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">
  <style>
    html, body, #myGrid { height: 100%; margin: 0; padding: 0;}
    #myGrid { height: 600px; width: 95vw; margin: 30px auto;}
  </style>
</head>
<body>
  <h2 id="h2-grid-title" style="text-align: center;">Grid</h2>  
  <div id="myGrid" class="ag-theme-alpine"></div>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.noStyle.js"></script>
  <script>
    // Фиксированный набор колонок:
    const columnsToShow = [
      "symbol", 'volume_24h', 'max_price_change_24h_pc', 'price_change_24h', 'price_change_4h', 'price_change_1h', 
      "ATR_pc", "BB_signal", "signal_ma_cross", "signal_level", 'signal_level_change', 'fast_der_sm_norm'
    ];

    function detectColTypeAndSetFilter(key, data) {
      let isNumber = true, isDate = true;
      for (let r of data) {
        if (!(key in r)) continue;
        if (typeof r[key] === "number") continue;
        if (typeof r[key] === "string") {
          if (isNaN(Number(r[key]))) isNumber = false;
          if (isNaN(Date.parse(r[key]))) isDate = false;
        } else {
          isNumber = false;
          isDate = false;
        }
      }
      if (isNumber) return 'agNumberColumnFilter';
      if (isDate) return 'agDateColumnFilter';
      return 'agTextColumnFilter';
    }

    fetch('https://dperov-org.github.io/pages/data/data.json')
      .then(res => {
          const lastModified = res.headers.get('Last-Modified');
          return res.json().then(data => ({ data, lastModified }));
      })
      .then(({ data, lastModified }) => {
        if (!Array.isArray(data) || data.length === 0) {
          document.getElementById('myGrid').innerHTML = "<div style='text-align:center'>Нет данных</div>";
          return;
        }

        let dateStr = lastModified ? new Date(lastModified).toLocaleString() : '';
        if (dateStr) {
          document.getElementById('h2-grid-title').textContent =
            `Grid (Актуальность данных: ${dateStr})`;
        }

        // Формируем колонку данных
        const columnDefs = columnsToShow.map((col, idx) => {
          // Для первой колонки (symbol) свой cellRenderer
          if(idx === 0) {
            return {
              headerName: col,
              field: col,
              sortable: true,
              filter: detectColTypeAndSetFilter(col, data),
              floatingFilter: true,
              pinned: 'left',
              cellRenderer: (params) => {
                const symbol = params.value;
                const href = `https://dperov-org.github.io/pages/plot/${symbol}.png`;
                return `<a href="${href}" target="_blank">${symbol}</a>`;
              }
            }
          }
          // Для остальных — стандартно
          return {
            headerName: col,
            field: col,
            sortable: true,
            filter: detectColTypeAndSetFilter(col, data),
            floatingFilter: true,
            pinned: null
          };
        });

        const gridOptions = {
          columnDefs: columnDefs,
          rowData: data,
        };

        agGrid.createGrid(document.getElementById('myGrid'), gridOptions);
      })
      .catch(err => {
        document.getElementById('myGrid').innerHTML = "<div style='text-align:center;color:red'>Ошибка загрузки или чтения data.json</div>";
        console.error(err);
      });
  </script>
</body>
</html>
