<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic AG Grid</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">
  <style>
    html, body, #myGrid { height: 100%; margin: 0; padding: 0;}
    #myGrid { height: 600px; width: 95vw; margin: 30px auto;}
  </style>
</head>
<body>
  <h2 style="text-align: center;">Dynamic AG Grid (Auto Filters & Sorting)</h2>
  <div id="myGrid" class="ag-theme-alpine"></div>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.noStyle.js"></script>
  <script>
    function detectColTypeAndSetFilter(key, data) {
      let isNumber = true, isDate = true;
      for (let r of data) {
        if (!(key in r)) continue;
        if (typeof r[key] === 'number') continue;
        if (typeof r[key] === 'string') {
          if (isNaN(Number(r[key]))) isNumber = false;
          if (isNaN(Date.parse(r[key]))) isDate = false;
        } else {
          isNumber = false;
          isDate = false;
        }
      }
      if (isNumber) return 'agNumberColumnFilter';
      if (isDate) return 'agDateColumnFilter';
      return 'agTextColumnFilter';
    }

    fetch('data/data.json')
      .then(res => res.json())
      .then(data => {
        if (!Array.isArray(data) || data.length === 0) {
          document.getElementById('myGrid').innerHTML = "<div style='text-align:center'>Нет данных</div>";
          return;
        }
        const columnDefs = Object.keys(data[0]).map(key => ({
          headerName: key,
          field: key,
          sortable: true,
          filter: detectColTypeAndSetFilter(key, data),
          floatingFilter: true
        }));
        new agGrid.Grid(document.getElementById('myGrid'), { columnDefs, rowData: data, domLayout: 'autoHeight' });
      })
      .catch(err => {
        document.getElementById('myGrid').innerHTML = "<div style='text-align:center;color:red'>Ошибка загрузки or чтения data.json</div>";
      });
  </script>
</body>
</html>
